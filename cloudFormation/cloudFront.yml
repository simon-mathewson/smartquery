Resources:
  CloudFrontFunctionRewriteUrls:
    Type: "AWS::CloudFront::Function"
    Properties:
      Name: "rewrite-urls"
      AutoPublish: true
      FunctionConfig:
        Comment: "Rewrite URLs for Next.js static export"
        Runtime: "cloudfront-js-2.0"
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          
          // If the URI doesn't end with a file extension, try adding .html
          if (!uri.includes('.') || uri.endsWith('/')) {
            // Remove trailing slash if present
            if (uri.endsWith('/')) {
              uri = uri.slice(0, -1);
            }
            
            // If it's not the root path, try adding .html
            if (uri !== '') {
              request.uri = uri + '.html';
            }
          }
          
          return request;
        }

  CloudFrontFunctionSetContentType:
    Type: "AWS::CloudFront::Function"
    Properties:
      Name: "set-content-type"
      AutoPublish: true
      FunctionConfig:
        Comment: "Set content-type for apple-app-site-association"
        Runtime: "cloudfront-js-2.0"
      FunctionCode: |
        function handler(event) {
          var response = event.response;
          var uri = event.request.uri;
          
          // Set content-type to application/json for apple-app-site-association
          if (uri === '/.well-known/apple-app-site-association') {
            response.headers['content-type'] = { value: 'application/json' };
          }
          
          return response;
        }

  CloudFrontDistributionUi:
    Type: "AWS::CloudFront::Distribution"
    Properties:
      DistributionConfig:
        Logging:
          IncludeCookies: false
          Bucket: ""
          Prefix: ""
        Comment: ""
        DefaultRootObject: "index.html"
