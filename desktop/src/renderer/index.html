<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQuery</title>
    <style>
      html,
      body {
        background-color: #ffffff;
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .dark body {
        background-color: #0a0a0a;
      }

      #title-bar {
        -webkit-app-region: drag;
        width: 100%;
        height: 24px;
        position: absolute;
      }

      #iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="title-bar"></div>
    <iframe id="iframe" src="%VITE_UI_URL%" allow="clipboard-write"></iframe>
    <script src="./index.ts" type="module"></script>
  </body>
</html>
