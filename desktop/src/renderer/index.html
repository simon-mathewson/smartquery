<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQuery</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #title-bar {
        -webkit-app-region: drag;
        width: 100%;
        height: 24px;
        position: absolute;
      }

      #iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      #splash-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 100ms linear;
        opacity: 1;
      }

      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .dark #splash-screen {
        background-color: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div id="title-bar"></div>
    <iframe
      id="iframe"
      src="%VITE_UI_URL%"
      allow="clipboard-write"
      onload="document.getElementById('splash-screen').classList.add('hidden')"
      onloadstart="document.getElementById('splash-screen').classList.remove('hidden')"
    ></iframe>
    <div id="splash-screen">
